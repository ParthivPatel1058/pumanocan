<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pumanocan — Store Once. Access Everywhere.</title>
    <script>
      // Intercept Google OAuth implicit flow redirect in popup
      if (window.location.hash && window.location.hash.includes('access_token=')) {
        const params = new URLSearchParams(window.location.hash.substring(1));
        const token = params.get('access_token');
        if (token) {
          if (window.opener) {
            window.opener.postMessage({ type: 'GOOGLE_OAUTH_TOKEN_SUCCESS', token: token }, window.location.origin);
            window.close();
          }
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
